name: chemistry_learning_app
description: AI-powered chemistry learning companion for students.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Localization
  intl: ^0.20.2

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^16.0.0

  # Functional Programming
  fpdart: ^1.1.1

  # Equality
  equatable: ^2.0.7

  # Networking
  dio: ^5.9.0

  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Local Storage
  shared_preferences: ^2.5.3
  hive_flutter: ^1.1.0

  # SVG
  flutter_svg: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.7.1
  json_serializable: ^6.11.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/