name: chemistry_learning_app
description: AI-powered chemistry learning companion for students.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Data modeling
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Networking / local storage
  dio: ^5.4.3
  shared_preferences: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  flutter_svg: ^2.0.10

  # Utility
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Build tools
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

